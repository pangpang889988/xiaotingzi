name: Build Android APK + iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/debug/*.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build iOS Framework for Simulator
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --stacktrace 2>&1
        continue-on-error: true

      - name: Show full Gradle error log
        run: |
          echo "=== Checking build output ==="
          ls -la composeApp/build/bin/iosSimulatorArm64/ 2>/dev/null || echo "No sim framework output"
          ls -la composeApp/build/reports/ 2>/dev/null || echo "No reports"
          find composeApp/build -name "*.log" -o -name "*.txt" 2>/dev/null | head -10
          echo "=== Gradle scanned logs ==="
          find . -path "*/build/reports/*" -name "*.html" 2>/dev/null | head -5

      - name: Upload logs if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-gradle-logs
          path: |
            composeApp/build/reports/
            .gradle/8.5/executionHistory/
          continue-on-error: true

      - name: Create Payload
        run: |
          mkdir -p Payload
          FRAMEWORK_PATH="composeApp/build/bin/iosSimulatorArm64/debugFramework"
          if [ -d "$FRAMEWORK_PATH" ]; then
            echo "Framework exists!"
            ls -la "$FRAMEWORK_PATH"
          else
            echo "Framework not found"
            find composeApp/build/bin -type d 2>/dev/null
          fi

      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: composeApp/build/bin/iosSimulatorArm64/debugFramework/
        continue-on-error: true
