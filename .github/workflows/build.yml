name: Build Android APK + iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/debug/*.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build iOS Framework for Device (arm64)
        run: ./gradlew :composeApp:linkDebugFrameworkIosArm64
        continue-on-error: true

      - name: Build iOS Framework for Simulator
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd iosApp
          xcodegen generate --spec project.yml
          echo "Xcode project generated"

      - name: Build iOS App (unsigned .app)
        run: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj \
            -scheme iosApp \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build 2>&1 | tail -30

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r iosApp/build/Build/Products/Debug-iphonesimulator/iosApp.app Payload/ || true
          if [ -d "Payload/iosApp.app" ]; then
            zip -r iosApp.ipa Payload/
            echo "IPA created"
          else
            echo "App not found in expected location, trying alternative paths..."
            find iosApp/build -name "*.app" -type d 2>/dev/null || echo "No .app found"
          fi

      - name: Upload iOS Framework
        uses: actions/upload-artifact@v4
        with:
          name: ios-framework
          path: composeApp/build/bin/iosSimulatorArm64/debugFramework/

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: iosApp.ipa
        continue-on-error: true
