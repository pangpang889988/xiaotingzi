name: Build Android APK + iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Build Android APK
        run: ./gradlew :composeApp:assembleDebug
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/debug/*.apk

  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Check architecture
        run: |
          echo "=== System Info ==="
          uname -a
          arch
          sysctl -n machdep.cpu.brand_string 2>/dev/null || echo "No CPU info"
          echo "=== Xcode version ==="
          xcodebuild -version

      - name: Build iOS Framework
        id: build_framework
        run: |
          ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 2>&1 | tee /tmp/gradle_output.txt; exit ${PIPESTATUS[0]}

      - name: Show Gradle Errors
        if: failure()
        run: |
          echo "=== Full Gradle Output (last 200 lines) ==="
          tail -200 /tmp/gradle_output.txt
          echo "=== ALL Errors/Warnings ==="
          grep -in "error\|exception\|failed\|could not\|unresolved\|missing\|not found\|compile" /tmp/gradle_output.txt | head -50

      - name: Upload Gradle Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-gradle-output
          path: /tmp/gradle_output.txt
